name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - name: Smoke test built CLI (prints version)
        run: node dist/cli.js --version
      - name: Ship-gate — real bridge dispatch must complete (no "nothing works")
        run: bun run smoke
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Web UI e2e (real dashboard in Chromium)
        run: bun run test:e2e

  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
