name: CI
# IMPORTANT: This repo uses default GitHub Actions permissions (read-only).
# The `release-please` job needs "Allow GitHub Actions to create and approve
# pull requests" enabled in: Repo Settings → Actions → General → Workflow
# permissions. Without it, the job fails with:
#   "GitHub Actions is not permitted to create or approve pull requests."
# Alternative (more secure, optional): set PERSONAL_ACCESS_TOKEN secret and use
# it instead of GITHUB_TOKEN in the release-please step. See AGENTS.md →
# "Release-please setup" for details.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Single job on a self-hosted runner. The MacBook has a registered
# self-hosted runner at ~/actions-runner-vibeflow/ for this repo.
# When the MacBook is online, jobs run instantly (no GitHub queue).
# When offline, this job stays pending — there's no cloud fallback
# because the cost of repeatedly re-running CI on cloud (and
# double-spending Actions minutes) outweighs the value of a fallback.
#
# Self-hosted runner setup (one-time):
#   1. cd ~/actions-runner-vibeflow
#   2. ./config.sh --unattended --url https://github.com/magicpro97/vibeflow \
#       --token <registration-token-from-repo-settings> \
#       --labels "self-hosted,linux,x64" \
#       --name "MacBook-Pro-cua-mac-vibeflow"
#   3. ./run.sh   # or: ./svc.sh install && ./svc.sh start
#
# To run CI on cloud (when self-hosted is offline for hours),
# temporarily change `runs-on:` below to `ubuntu-latest`.

jobs:
  check:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - name: Smoke test built CLI (prints version)
        run: node dist/cli.js --version
      - name: Coverage gate — fail if line coverage < 100%
        run: bun run coverage:check
      - name: Ship-gate — real bridge dispatch must complete (no nothing works)
        run: bun run smoke
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Web UI e2e (real dashboard in Chromium)
        run: bun run test:e2e

  release-please:
    runs-on: [self-hosted, linux, x64]
    # Only run release-please on main-branch pushes. Self-hosted
    # runner so it doesn't queue on cloud throttling.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: release-please action
        # Token priority:
        # 1. VIBEFLOW_BOT_TOKEN (PAT, no repo setting required)
        # 2. GITHUB_TOKEN (default, requires "Allow GitHub Actions
        #    to create and approve pull requests" in repo settings)
        #
        # Set VIBEFLOW_BOT_TOKEN at
        # https://github.com/magicpro97/vibeflow/settings/secrets/actions
        # (a PAT from a bot account with `contents: write` and
        # `pull-requests: write` on the repo). Falls back to
        # GITHUB_TOKEN if the PAT is missing — which works only if
        # the repo setting "Allow GitHub Actions to create and
        # approve pull requests" is enabled.
        env:
          GITHUB_TOKEN: ${{ secrets.VIBEFLOW_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.VIBEFLOW_BOT_TOKEN || secrets.GITHUB_TOKEN }}
