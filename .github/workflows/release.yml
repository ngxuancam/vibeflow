name: Release

# Publishes @magicpro97/vibeflow to npm when a release-please Release PR is merged
# into main. release-please (running in ci.yml) opens a Release PR that bumps
# version in package.json + .release-please-manifest.json, adds changelog, and
# applies the `autorelease:pending` label. When a human merges that PR, this
# workflow runs, verifies the label is still present, then publishes + tags.
#
# Two jobs:
#   - verify  (self-hosted): the full `bun run check` gate needs the codegraph
#     binary to reach 100% per-file coverage on src/commands/tools.ts; that binary
#     only exists on the self-hosted runner. Builds dist/ and uploads it.
#   - publish (github-hosted): `npm publish --provenance` requires a github-hosted
#     runner (sigstore rejects "self-hosted"). Downloads dist/ and publishes.
#
# Requires:
#   - Repository secret NPM_TOKEN (npm automation/granular token with 2FA bypass).
#   - PR merged with label `autorelease:pending` (added/removed by release-please bot).
on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch: {}

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    outputs:
      exists: ${{ steps.remote.outputs.exists }}
      version: ${{ steps.local.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Read local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check npm for this version
        id: remote
        run: |
          name=$(node -p "require('./package.json').name")
          if npm view "$name@${{ steps.local.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.local.outputs.version }} already on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install, verify, build
        if: steps.remote.outputs.exists == 'false'
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run build

      - name: Upload dist for publish job
        if: steps.remote.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            docs/
            templates/
            .agents/skills/skill-creator/
            package.json
            package-lock.json
            README.md
            LICENSE
          if-no-files-found: error
          retention-days: 1
          include-hidden-files: true

  publish:
    needs: verify
    if: needs.verify.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download dist from verify job
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Publish to npm
        # dist/ is already built + verified by the `verify` job and downloaded
        # above, so skip lifecycle scripts (prepublishOnly runs `bun run build`,
        # and bun is not installed on this github-hosted runner). --ignore-scripts
        # publishes the prebuilt artifact as-is.
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release
        run: |
          git tag "v${{ needs.verify.outputs.version }}"
          git push origin "v${{ needs.verify.outputs.version }}"
