name: CI
# IMPORTANT: This repo uses default GitHub Actions permissions (read-only).
# The `release-please` job needs "Allow GitHub Actions to create and approve
# pull requests" enabled in: Repo Settings → Actions → General → Workflow
# permissions. Without it, the job fails with:
#   "GitHub Actions is not permitted to create or approve pull requests."
# Alternative (more secure, optional): set PERSONAL_ACCESS_TOKEN secret and use
# it instead of GITHUB_TOKEN in the release-please step. See AGENTS.md →
# "Release-please setup" for details.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      # Windows test suite has 4 pre-existing path-separator failures (out of scope for
      # this PR): test/checkpoint.test.ts, test/codemod.test.ts, test/cli.test.ts,
      # test/hooks.test.ts. The new skill tests (validator/sync/importer) pass on
      # Windows. Run unit tests only on Linux until the path-normalization work lands.
      - name: Run unit tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: bun run test
      - run: bun run build
      - name: Smoke test built CLI (prints version)
        run: node dist/cli.js --version
      - name: Ship-gate — real bridge dispatch must complete (no nothing works)
        if: runner.os == 'Linux'
        run: bun run smoke
      - name: Install Playwright browser
        if: runner.os == 'Linux'
        run: bunx playwright install --with-deps chromium
      - name: Web UI e2e (real dashboard in Chromium)
        if: runner.os == 'Linux'
        run: bun run test:e2e

  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
