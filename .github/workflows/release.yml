name: Release

# Publishes @magicpro97/vibeflow to npm when a release-please Release PR is merged
# into main. release-please (running in ci.yml) opens a Release PR that bumps
# version in package.json + .release-please-manifest.json, adds changelog, and
# applies the `autorelease:pending` label. When a human merges that PR, this
# workflow runs, verifies the label is still present, then publishes + tags.
#
# Requires:
#   - Repository secret NPM_TOKEN (npm automation/granular token with 2FA bypass).
#   - PR merged with label `autorelease:pending` (added/removed by release-please bot).
on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch: {}

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'autorelease:pending'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check npm for this version
        id: remote
        run: |
          name=$(node -p "require('./package.json').name")
          if npm view "$name@${{ steps.local.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.local.outputs.version }} already on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install, verify, build
        if: steps.remote.outputs.exists == 'false'
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run build

      - name: Publish to npm
        if: steps.remote.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release
        if: steps.remote.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.local.outputs.version }}"
          git push origin "v${{ steps.local.outputs.version }}"
