<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VibeFlow architecture: four layers from npm CLI to tool adapters">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <style>
      .lyr   { fill:#11161f; stroke:#243042; stroke-width:1.5; rx:12; }
      .lt    { fill:#e6edf3; font:600 19px ui-sans-serif,system-ui,sans-serif; }
      .ld    { fill:#8b97a7; font:400 13px ui-sans-serif,system-ui,sans-serif; }
      .num   { fill:#0d1117; font:800 15px ui-sans-serif,system-ui,sans-serif; }
      .arrow { stroke:#5eead4; stroke-width:2; marker-end:url(#ah); }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#5eead4"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="#0a0d12"/>

  <!-- Layer 1 -->
  <rect class="lyr" x="180" y="28" width="440" height="74"/>
  <circle cx="212" cy="65" r="15" fill="url(#accent)"/>
  <text class="num" x="207" y="70">1</text>
  <text class="lt" x="244" y="58">npm CLI Launcher</text>
  <text class="ld" x="244" y="80">npx @magicpro97/vibeflow · vf</text>

  <!-- Layer 2 -->
  <rect class="lyr" x="180" y="138" width="440" height="74"/>
  <circle cx="212" cy="175" r="15" fill="url(#accent)"/>
  <text class="num" x="207" y="180">2</text>
  <text class="lt" x="244" y="168">Local Web UI</text>
  <text class="ld" x="244" y="190">visual workflow dashboard, served locally</text>

  <!-- Layer 3 -->
  <rect class="lyr" x="180" y="248" width="440" height="74"/>
  <circle cx="212" cy="285" r="15" fill="url(#accent)"/>
  <text class="num" x="207" y="290">3</text>
  <text class="lt" x="244" y="278">Workflow Orchestrator Core</text>
  <text class="ld" x="244" y="300">spec → dispatch → review → confidence gate</text>

  <!-- Layer 4 -->
  <rect class="lyr" x="120" y="358" width="560" height="80"/>
  <circle cx="152" cy="398" r="15" fill="url(#accent)"/>
  <text class="num" x="147" y="403">4</text>
  <text class="lt" x="184" y="390">Tool Adapters</text>
  <text class="ld" x="184" y="412">Claude Code · Codex CLI · GitHub Copilot CLI</text>

  <!-- arrows -->
  <line class="arrow" x1="400" y1="102" x2="400" y2="134"/>
  <line class="arrow" x1="400" y1="212" x2="400" y2="244"/>
  <line class="arrow" x1="400" y1="322" x2="400" y2="354"/>
</svg>
